version: "2"
sql:
  - engine: postgresql
    queries: internal/db/queries
    schema: migrations
    gen:
      go:
        package: db
        out: internal/db
        sql_package: pgx/v5
        overrides:
          - go_type:
              import: github.com/google/uuid
              type: UUID
            db_type: uuid
          - go_type:
              import: github.com/google/uuid
              type: NullUUID
            db_type: uuid
            nullable: true
