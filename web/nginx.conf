worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Without this every file (including .html) is served as the default
    # octet/plain type, so the browser never executes the upload form's
    # <script>. Map extensions to real MIME types.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format torii_headers escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"host":"$host",'
            '"http_host":"$http_host",'
            '"user_agent":"$http_user_agent",'
            '"referer":"$http_referer",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"x_forwarded_proto":"$http_x_forwarded_proto",'
            '"x_forwarded_host":"$http_x_forwarded_host",'
            '"x_real_ip":"$http_x_real_ip",'
            '"x_torii_user":"$http_x_torii_user",'
            '"x_torii_username":"$http_x_torii_username",'
            '"x_torii_email":"$http_x_torii_email",'
            '"x_torii_roles":"$http_x_torii_roles",'
            '"x_torii_issued_at":"$http_x_torii_issued_at",'
            '"x_torii_signature":"$http_x_torii_signature",'
            '"authorization":"$http_authorization",'
            '"cookie":"$http_cookie"'
        '}';

    access_log /dev/stdout torii_headers;
    error_log  /dev/stderr warn;

    sendfile on;
    keepalive_timeout 65;

    # Accept large bodies so this sample never rejects first — the point is to
    # exercise torii's per-service max_body_size, not nginx's own cap.
    client_max_body_size 1024m;

    # Upload temp files live under /tmp (a tmpfs, see docker-compose) so they
    # share a filesystem with the WebDAV destination — the PUT rename stays on
    # one device — and so everything is wiped on container restart.
    client_body_temp_path /tmp/nginx-body-temp;

    server {
        listen 80 default_server;
        server_name _;

        location = /500 {
            add_header Content-Type text/plain always;
            return 500 "intentional 500 from upstream - host=$host uri=$request_uri\n";
        }

        # WebDAV upload target. PUT /uploads/<name> writes /tmp/uploads/<name>;
        # GET /uploads/ lists what is currently stored (autoindex).
        location /uploads/ {
            root /tmp;
            dav_methods PUT DELETE;
            create_full_put_path on;
            dav_access user:rw group:rw all:r;
            autoindex on;
            # Show human-readable sizes (e.g. 1.5M) in the listing instead of
            # raw byte counts.
            autoindex_exact_size off;
        }

        # Upload form (static file mounted by docker-compose). Picks a file and
        # PUTs it to /uploads/<name>.
        location / {
            root /usr/share/nginx/html;
            index upload.html;
        }
    }
}
