services:
  app:
    restart: unless-stopped
    build:
      context: ./
      dockerfile: Dockerfile
    image: codingcoffee/torii:latest
    ports:
      - "1356:1356"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .app.env
    environment:
      APP_ENV: production
      AUDIT_LOG_DIR: /app/logs
    volumes:
      - ./audit-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:1356/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    volumes:
      - ./postgres-data:/var/lib/postgresql/18/docker
    env_file:
      - .postgres.env
    healthcheck:
      test: 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"'
      interval: 10s
      timeout: 5s
      retries: 5
