<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="torii — identity-aware reverse proxy">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1a1614" stroke-width="0.5"/>
    </pattern>
    <pattern id="grain" width="160" height="160" patternUnits="userSpaceOnUse">
      <rect width="160" height="160" fill="transparent"/>
      <circle cx="13" cy="41" r="0.5" fill="#fff" opacity="0.06"/>
      <circle cx="71" cy="19" r="0.5" fill="#fff" opacity="0.05"/>
      <circle cx="103" cy="88" r="0.5" fill="#fff" opacity="0.07"/>
      <circle cx="42" cy="121" r="0.5" fill="#fff" opacity="0.05"/>
      <circle cx="139" cy="55" r="0.5" fill="#fff" opacity="0.06"/>
      <circle cx="29" cy="143" r="0.5" fill="#fff" opacity="0.05"/>
      <circle cx="148" cy="129" r="0.5" fill="#fff" opacity="0.07"/>
      <circle cx="89" cy="73" r="0.5" fill="#fff" opacity="0.05"/>
    </pattern>
    <linearGradient id="redFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d44132"/>
      <stop offset="100%" stop-color="#a82a1f"/>
    </linearGradient>
    <linearGradient id="inkFade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0a09"/>
      <stop offset="100%" stop-color="#161210"/>
    </linearGradient>
  </defs>

  <!-- ink panel (left 70%) -->
  <rect width="1200" height="630" fill="url(#inkFade)"/>
  <rect width="840" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- vermillion panel (right 30%) -->
  <rect x="840" y="0" width="360" height="630" fill="url(#redFade)"/>

  <!-- top hairline frame on ink side -->
  <line x1="64" y1="60" x2="776" y2="60" stroke="#3a2f2c" stroke-width="1"/>
  <line x1="64" y1="570" x2="776" y2="570" stroke="#3a2f2c" stroke-width="1"/>

  <!-- top-right corner marks on red panel -->
  <g stroke="#1a1614" stroke-width="1" fill="none">
    <path d="M 856 32 L 856 56 L 880 56"/>
    <path d="M 1184 32 L 1184 56 L 1160 56"/>
    <path d="M 856 598 L 856 574 L 880 574"/>
    <path d="M 1184 598 L 1184 574 L 1160 574"/>
  </g>

  <!-- HERO HEADLINE — split serif/italic -->
  <g transform="translate(64, 280)">
    <text x="0" y="0" font-family="'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif" font-size="184" font-weight="700" fill="#f5ede2" letter-spacing="-6">
      torii<tspan font-style="italic" fill="#d44132" dx="-6">.</tspan>
    </text>
  </g>

  <!-- subhead rule -->
  <line x1="64" y1="328" x2="120" y2="328" stroke="#d44132" stroke-width="3"/>

  <!-- tagline (serif, large) -->
  <g transform="translate(64, 388)" fill="#e8d8c8" font-family="'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif" font-size="42" font-weight="400">
    <text x="0" y="0">identity-aware <tspan font-style="italic" fill="#d44132">reverse proxy</tspan></text>
  </g>


  <!-- ====================  TORII GATE ART (right panel)  ==================== -->
  <!-- Inverse: gate rendered in deep ink on vermillion field, oversized & cropped -->
  <g transform="translate(870, 110)">
    <!-- top kasagi (curved roof beam) -->
    <path d="M 6 24 C 60 24, 100 60, 150 60 C 200 60, 240 24, 294 24 L 294 42 C 240 42, 200 78, 150 78 C 100 78, 60 42, 6 42 Z" fill="#1a1614"/>
    <!-- shimaki (plate under roof) -->
    <rect x="36" y="84" width="228" height="9" fill="#1a1614"/>
    <!-- gakuzuka (center plaque post) -->
    <rect x="138" y="84" width="24" height="36" fill="#1a1614"/>
    <!-- nuki (crossbeam) -->
    <rect x="42" y="120" width="216" height="22" fill="#1a1614"/>
    <!-- left hashira (column) — pronounced taper, wider at base -->
    <path d="M 54 410 L 102 410 L 92 142 L 64 142 Z" fill="#1a1614"/>
    <!-- right hashira (column) -->
    <path d="M 198 410 L 246 410 L 236 142 L 208 142 Z" fill="#1a1614"/>
    <!-- ground line -->
    <line x1="20" y1="410" x2="280" y2="410" stroke="#1a1614" stroke-width="2"/>
  </g>

  <!-- URL on vermillion panel, centered under the torii symbol -->
  <text x="1020" y="608" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="22" font-weight="800" fill="#1a1614" letter-spacing="5" text-anchor="middle">TORIIGATE.ORG</text>

</svg>
