services:
  nginx: # a sample service to test proxy pass (and file uploads)
    restart: unless-stopped
    image: nginx:1.29.8-alpine3.23
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-upload.html:/usr/share/nginx/html/upload.html:ro
      # /tmp is tmpfs so uploaded files (under /tmp/uploads) live only in
      # memory and are wiped whenever the container restarts. Sticky 1777 so
      # the nginx worker can create the upload + body-temp dirs.
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 01777

  app:
    restart: unless-stopped
    build:
      context: ./
      dockerfile: Dockerfile.dev
    volumes:
      - ./:/app
    working_dir: /app
    ports:
      - 1356:1356
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .app.env

  postgres:
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    volumes:
      - ./postgres-data:/var/lib/postgresql/18/docker
    env_file:
      - .postgres.env
    healthcheck:
      test: "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""
      interval: 10s
      timeout: 5s
      retries: 5
